<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#dc2626"/>
      <stop offset="100%" stop-color="#b91c1c"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#b91c1c"/>
    </linearGradient>
  </defs>

  <!-- 배경 -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Geometric pattern -->
  <circle cx="998" cy="273" r="67" fill="#b91c1c" opacity="0.07"/>
    <circle cx="1004" cy="476" r="87" fill="#b91c1c" opacity="0.18"/>
    <circle cx="777" cy="497" r="67" fill="#b91c1c" opacity="0.18"/>
    <circle cx="1284" cy="236" r="46" fill="#b91c1c" opacity="0.20"/>
    <circle cx="636" cy="113" r="30" fill="#b91c1c" opacity="0.07"/>
    <circle cx="335" cy="224" r="97" fill="#b91c1c" opacity="0.13"/>
    <rect x="81" y="-12" width="37" height="68" rx="8" fill="#dc2626" opacity="0.12" transform="rotate(17, 302, 460)"/>
    <rect x="55" y="55" width="74" height="85" rx="8" fill="#dc2626" opacity="0.12" transform="rotate(24, 1179, -37)"/>
    <rect x="-92" y="-19" width="60" height="56" rx="8" fill="#dc2626" opacity="0.10" transform="rotate(17, 1289, -93)"/>
    <rect x="691" y="686" width="99" height="22" rx="8" fill="#dc2626" opacity="0.12" transform="rotate(33, 1112, 195)"/>
    <rect x="943" y="391" width="67" height="32" rx="8" fill="#dc2626" opacity="0.13" transform="rotate(42, 590, 483)"/>
    <rect x="402" y="522" width="30" height="66" rx="8" fill="#dc2626" opacity="0.09" transform="rotate(43, 942, 169)"/>
    <rect x="363" y="510" width="62" height="83" rx="8" fill="#dc2626" opacity="0.03" transform="rotate(18, 580, 469)"/>
    <rect x="714" y="417" width="60" height="86" rx="8" fill="#dc2626" opacity="0.12" transform="rotate(0, 655, 451)"/>
    <polygon points="955,-92 981,-40 929,-40" fill="#b91c1c" opacity="0.10"/>
    <polygon points="896,-135 987,47 805,47" fill="#b91c1c" opacity="0.05"/>
    <polygon points="627,129 688,251 566,251" fill="#b91c1c" opacity="0.04"/>
    <polygon points="1106,-38 1188,126 1024,126" fill="#b91c1c" opacity="0.10"/>

  <!-- Wave at bottom -->
  <path d="M0,578 C360,604 840,552 1200,578 L1200,630 L0,630Z" fill="#b91c1c" opacity="0.3"/>

  <!-- 중앙 텍스트 카드 -->
  <rect x="80" y="195" width="1040" height="260" rx="20" fill="rgba(0,0,0,0.35)" filter="url(#blur-bg)"/>
  <filter id="blur-bg"><feGaussianBlur stdDeviation="8"/></filter>

  <text x="600" y="270" text-anchor="middle" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="44" font-weight="700" fill="#ffffff" letter-spacing="2">
    홍대 코인노래방 할인
  </text>
  <text x="600" y="330" text-anchor="middle" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="22" font-weight="400" fill="rgba(255,255,255,0.85)">
    홍대 — 코인노래방
  </text>

  <!-- Accent line -->
  <line x1="450" y1="355" x2="750" y2="355" stroke="#fbbf24" stroke-width="3" stroke-linecap="round" opacity="0.8"/>

  <!-- 하단 CTA -->
  <rect x="440" y="385" width="320" height="40" rx="20" fill="#fbbf24" opacity="0.9"/>
  <text x="600" y="411" text-anchor="middle" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="16" font-weight="600" fill="#ffffff">
    ▼ 자세히 보기
  </text>

  <!-- 상단 브랜드 -->
  <text x="60" y="55" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="18" font-weight="600" fill="rgba(255,255,255,0.6)">
    홍대 홍대 코인노래방 할인 — 코인노래방
  </text>
</svg>